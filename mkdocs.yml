site_name: Anas Rabhi — Ingénieur IA
site_url: https://ianas.fr
site_author: Anas Rabhi
site_description: >-
  Blog et retours d'expérience sur l'IA en entreprise : RAG, agents IA,
  NLP et LLMOps. Par Anas Rabhi, consultant Data Scientist freelance à Toulouse.


# Repository
# repo_name: anas-rabhi/anas-rabhi.github.io
# repo_url: https://github.com/anas-rabhi/anas-rabhi.github.io

# Copyright
copyright: Copyright &copy; 2024 - 2026 Anas Rabhi


# Configuration
theme:
  name: material
  language: fr
  custom_dir: docs/overrides
  features:
    - announce.dismiss
    - content.action.edit
    - content.action.view
    - content.code.annotate
    - content.code.copy
    # - content.code.select
    # - content.footnote.tooltips
    # - content.tabs.link
    - content.tooltips
    # - header.autohide
    # - navigation.expand
    - navigation.footer
    - navigation.indexes
    - navigation.instant
    - navigation.instant.prefetch
    # - navigation.instant.progress
    # - navigation.prune
    - navigation.sections
    - navigation.tabs
    # - navigation.tabs.sticky
    - navigation.top
    - navigation.tracking
    - search.highlight
    - search.share
    - search.suggest
    - toc.follow
    # - toc.integrate
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/link
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/toggle-switch
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: indigo
      toggle:
        icon: material/toggle-switch-off
        name: Switch to system preference
  font:
    text: Roboto
    code: Roboto Mono
  favicon: assets/favicon.png
  icon:
    logo: logo

# Plugins
plugins:
  - search:
      separator: '[\s\u200b\-_,:!=\[\]()"`/]+|\.(?!\d)|&[lg]t;|(?!\b)(?=[A-Z][a-z])'
  - redirects:
      redirect_maps:
        # ---------------------------------------------------------------
        # FR \u2014 anciennes URLs (mauvais slug ou mauvaise date) \u2192 URL r\u00e9elle
        # ---------------------------------------------------------------
        'blog/2025/03/26/comment-ameliorer-l-IA.md': 'blog/posts/comment-ameliorer-l-IA.md'
        'blog/2025/03/26/comment-am\u00e9liorer-le-rag.md': 'blog/posts/comment-ameliorer-l-IA.md'
        'blog/2025/04/01/reussir-a-suivre-les-sorties-en-IA.md': 'blog/posts/reussir-a-suivre-les-sorties-en-IA.md'
        'blog/2025/05/01/comprendre-l-IA-guide.md': 'blog/posts/comprendre-l-IA-guide.md'
        'blog/2025/06/01/comprendre-l-IA-generative.md': 'blog/posts/comprendre-l-IA-generative.md'
        'blog/2025/06/04/mon-rag-ne-marche-pas--pourquoi-lanalyse-derreur-change-tout.md': 'blog/posts/pourquoi-le-rag-ne-fonctionne-pas.md'
        'blog/2025/06/04/mon-rag-ne-marche-pas-pourquoi-l-analyse-derreur-change-tout.md': 'blog/posts/pourquoi-le-rag-ne-fonctionne-pas.md'
        'blog/2025/11/15/utiliser-chatgpt-efficacement.md': 'blog/posts/utiliser-chatgpt-efficacement.md'
        'blog/2025/12/15/prompt-caching-reduire-cout-llm.md': 'blog/posts/prompt-caching-reduire-cout-llm.md'
        'blog/2026/01/15/c-est-quoi-un-agent-ia.md': 'blog/posts/c-est-quoi-un-agent-ia.md'
        'blog/2026/01/22/crewai-langchain-langgraph-comparatif-pragmatique.md': 'blog/posts/crewai-langchain-langgraph-comparatif-pragmatique.md'
        'blog/2026/02/01/mais-que-es-le-rag.md': 'blog/posts/mais-que-es-le-rag.md'
        'blog/2026/02/15/memoire-agents-ia-long-terme.md': 'blog/posts/memoire-agents-ia-long-terme.md'
        'blog/2026/02/21/les-5-erreurs-rag.md': 'blog/posts/les-5-erreurs-rag.md'
        'blog/2026/03/01/les-5-erreurs-rag.md': 'blog/posts/les-5-erreurs-rag.md'
        'blog/2026/03/15/les-4-causes-techniques-echec-rag.md': 'blog/posts/les-4-causes-techniques-echec-rag.md'
        'blog/2026/03/22/agentic-rag-vs-rag-classique.md': 'blog/posts/agentic-rag-vs-rag-classique.md'
        'blog/2026/03/29/pourquoi-le-rag-ne-fonctionne-pas.md': 'blog/posts/pourquoi-le-rag-ne-fonctionne-pas.md'
        'blog/2026/04/01/rag-trop-simple.md': 'blog/posts/rag-trop-simple.md'
        'blog/2026/04/05/parsing-pdf-rag-extraction-documents.md': 'blog/posts/parsing-pdf-rag-extraction-documents.md'
        'blog/2026/04/12/embeddings-rag-comprendre-importance.md': 'blog/posts/embeddings-rag-comprendre-importance.md'
        'blog/2026/04/18/rag-hybride-bm25-vectoriel.md': 'blog/posts/rag-hybride-bm25-vectoriel.md'
        'blog/2026/04/26/le-rag-est-fini.md': 'blog/posts/le-rag-est-fini.md'
        'blog/2026/04/30/geo-comment-fonctionnent-les-moteurs-ia.md': 'blog/posts/geo-comment-fonctionnent-les-moteurs-ia.md'
        'blog/2026/05/10/stack-ia-production-langchain-llamaindex-limites.md': 'blog/posts/stack-ia-production-langchain-llamaindex-limites.md'
        # ---------------------------------------------------------------
        # EN \u2014 /en/blog/posts/<slug>/ n'existe pas (URLs dat\u00e9es) \u2192 URL r\u00e9elle
        # ---------------------------------------------------------------
        'en/blog/posts/c-est-quoi-un-agent-ia/index.md': 'en/blog/posts/c-est-quoi-un-agent-ia.md'
        'en/blog/posts/agentic-rag-vs-rag-classique/index.md': 'en/blog/posts/agentic-rag-vs-rag-classique.md'
        'en/blog/posts/chunking-optimal-rag/index.md': 'en/blog/posts/chunking-optimal-rag.md'
        'en/blog/posts/embeddings-rag-comprendre-importance/index.md': 'en/blog/posts/embeddings-rag-comprendre-importance.md'
        'en/blog/posts/evaluer-rag-production-metriques-ragas/index.md': 'en/blog/posts/evaluer-rag-production-metriques-ragas.md'
        'en/blog/posts/mais-que-es-le-rag/index.md': 'en/blog/posts/mais-que-es-le-rag.md'
        'en/blog/posts/mcp-model-context-protocol-agents-ia/index.md': 'en/blog/posts/mcp-model-context-protocol-agents-ia.md'
        'en/blog/posts/memoire-agents-ia-long-terme/index.md': 'en/blog/posts/memoire-agents-ia-long-terme.md'
        'en/blog/posts/optimiser-rag-techniques/index.md': 'en/blog/posts/optimiser-rag-techniques.md'
        'en/blog/posts/rag-hybride-bm25-vectoriel/index.md': 'en/blog/posts/rag-hybride-bm25-vectoriel.md'
  - blog:
      post_date_format: dd/MM/yyyy
      post_url_format: "{date}/{slug}"
      authors_file: "{blog}/.authors.yml"
      pagination_per_page: 10
  - blog:
      blog_dir: notebooks
      post_date_format: dd/MM/yyyy
      post_url_format: "{date}/{slug}"
      authors_file: "{blog}/.authors.yml"
      pagination_per_page: 10
  - blog:
      blog_dir: en/blog
      post_date_format: dd/MM/yyyy
      post_url_format: "{date}/{slug}"
      authors_file: "{blog}/.authors.yml"
      pagination_per_page: 10
  - git-revision-date-localized:
      type: iso_datetime
      enable_creation_date: false
      fallback_to_build_date: true
      enabled: !ENV [MKDOCS_GIT_DATE, true]
  - minify:
      minify_html: true

# Additional CSS
extra_css:
  - stylesheets/extra.css

# Hooks
hooks:
  - hooks/seo.py

# Additional configuration
extra:
  alternate:
    - name: Français
      link: /
      lang: fr
    - name: English
      link: /en/
      lang: en
  analytics:
    provider: google
    property: G-03FZVX8L64
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/anas-rabhi
    - icon: fontawesome/brands/x-twitter
      link: https://x.com/anas9r
    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com/in/anasrabhi/


# Extensions
markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
      emoji_index: !!python/name:material.extensions.emoji.twemoji
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.magiclink:
      normalize_issue_symbols: true
      repo_url_shorthand: true
      user: squidfunk
      repo: mkdocs-material
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets:
      auto_append:
        - includes/mkdocs.md
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
      combine_header_slug: true
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

  # Page tree
nav:
  - Accueil: index.md
  - Blog:
    - blog/index.md
  - Notebooks:
    - notebooks/index.md
  - Guides:
    - RAG: rag.md
    - Agents IA: agents-ia.md
    - Comprendre l'IA: comprendre-ia.md
  - À propos: a-propos.md
  - Consultant IA Toulouse: consultant-ia-toulouse.md
